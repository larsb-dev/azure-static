name: Azure Static Web Apps CI/CD

# Trigger workflow on push
on:
  push:
    branches:
      - main      # production
      - '*'       # all other branches → preview

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      # Checkout the repo
      - uses: actions/checkout@v3

      # Setup Node.js for Vue build
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24'

      # Install dependencies and build Vue frontend
      - name: Install & Build Vue App
        run: |
          npm install
          npm run build
        env:
          VITE_APP_ENVIRONMENT: ${{ github.ref == 'refs/heads/main' && secrets.APP_ENVIRONMENT_PRODUCTION || secrets.APP_ENVIRONMENT_DEVELOPMENT }}

      # Setup Python for Azure Functions API
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # Install Python dependencies for Azure Function (if you have requirements.txt)
      - name: Install Python dependencies
        working-directory: ./api
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # Deploy to Azure Static Web Apps
      - name: Deploy to Azure SWA
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # used for PRs and comments
          action: "upload"
          production_branch: "main" # force production branch mapping
          app_location: "dist"     # deploy prebuilt Vite artifact directly
          skip_app_build: true     # already built above
          api_location: "api"      # Azure Function folder
          deployment_environment: "Development" # set environment for non-production branches

        # Alternative deployment step if you want Azure to build the app using Oryx
        # with:
        #   azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
        #   repo_token: ${{ secrets.GITHUB_TOKEN }} # used for PRs and comments
        #   action: "upload"
        #   production_branch: "main" # force production branch mapping
        #   app_location: "."     # repo root for app source when Oryx builds
        #   output_location: "dist" # Vite build artifact directory
        #   api_location: "api"      # Azure Function folder
        #   deployment_environment: "Development" # set environment for non-production branches
